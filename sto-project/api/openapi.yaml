openapi: 3.0.3
info:
  title: MES Enterprise API
  version: 1.0.0
  description: API системи управління виробництвом (замовлення, склад, контроль якості)

servers:
  - url: http://localhost:8000/api/v1
    description: Локальний сервер

paths:
  /orders:
    get:
      summary: Отримати список виробничих замовлень
      operationId: getOrders
      tags: [Orders]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Успішно
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
    post:
      summary: Створити нове виробниче замовлення
      operationId: createOrder
      tags: [Orders]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
      responses:
        '201':
          description: Замовлення створено
        '400':
          description: Помилка валідації
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/{id}:
    get:
      summary: Отримати деталі замовлення за ID
      operationId: getOrderById
      tags: [Orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Успішно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Не знайдено
    patch:
      summary: Оновити статус замовлення
      operationId: updateOrderStatus
      tags: [Orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Статус оновлено

  /materials:
    get:
      summary: Отримати список сировини на складі
      operationId: getMaterials
      tags: [Materials]
      responses:
        '200':
          description: Успішно
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Material'
    post:
      summary: Додати надходження сировини
      operationId: addMaterial
      tags: [Materials]
      responses:
        '201':
          description: Додано на склад

  /materials/{id}:
    get:
      summary: Інформація про конкретний матеріал
      operationId: getMaterialById
      tags: [Materials]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Успішно

  /quality-reports:
    get:
      summary: Отримати всі звіти контролю якості
      operationId: getQualityReports
      tags: [Quality]
      responses:
        '200':
          description: Успішно
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QualityReport'
    post:
      summary: Зареєструвати результати контролю (норма/брак)
      operationId: createQualityReport
      tags: [Quality]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QualityReport'
      responses:
        '201':
          description: Звіт збережено

  /quality-reports/{id}:
    get:
      summary: Деталі звіту якості
      operationId: getQualityReportById
      tags: [Quality]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Успішно

components:
  schemas:
    Order:
      type: object
      properties:
        id:
          type: integer
        client_id:
          type: integer
        status:
          type: string
          enum: [new, planned, in_progress, quality_check, completed]
        deadline:
          type: string
          format: date-time

    Material:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        stock_quantity:
          type: number
        unit:
          type: string

    QualityReport:
      type: object
      properties:
        id:
          type: integer
        order_id:
          type: integer
        inspector_name:
          type: string
        is_passed:
          type: boolean
        defect_details:
          type: string

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
